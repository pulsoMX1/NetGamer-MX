<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ofertas | NetGamer MX</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #0a0a0a; color: #ffffff; }
        
        /* Barra de navegación superior */
        .navbar {
            background: #111;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .navbar h2 { color: #00ffcc; font-weight: 800; letter-spacing: 1px; margin: 0; font-size: 20px;}
        .user-info { display: flex; align-items: center; gap: 20px; }
        .user-email { font-size: 14px; color: #aaa; }
        .btn-logout {
            background: #ff4757; color: white; border: none; padding: 8px 15px;
            border-radius: 5px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .btn-logout:hover { background: #ff6b81; }

        /* Contenedor principal */
        .main-content { max-width: 1200px; margin: 40px auto; padding: 0 20px; text-align: center; }
        .header-title { font-size: 32px; margin-bottom: 10px; font-weight: 800; }
        .header-subtitle { color: #888; margin-bottom: 30px; font-size: 16px; }

        /* Contenedor del Iframe */
        .offerwall-container {
            background: #111;
            border-radius: 15px;
            border: 1px solid #333;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            min-height: 800px;
            position: relative;
        }
        .loading-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffcc; font-size: 18px; font-weight: 600;
        }
        iframe { width: 100%; height: 800px; border: none; border-radius: 10px; position: relative; z-index: 2; }
    </style>
</head>
<body>

    <nav class="navbar">
        <h2>NETGAMER MX</h2>
        <div class="user-info">
            <span class="user-email" id="displayEmail">Cargando perfil...</span>
            <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
        </div>
    </nav>

    <div class="main-content">
        <h1 class="header-title">Centro de Recompensas</h1>
        <p class="header-subtitle">Completa misiones, encuestas y descarga juegos para ganar NetCoins.</p>

        <div class="offerwall-container">
            <div class="loading-text" id="cargandoMuro">Conectando con los servidores...</div>
            <div id="iframe-wrapper"></div>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient(
            'https://meiwuluwrdjszxeyoqtt.supabase.co', 
            'sb_publishable_gZgGIamNJqf8ir8vvt1OTw_bJ-rosi4'
        );

        async function initPage() {
            const { data: { session }, error } = await supabaseClient.auth.getSession();

            if (!session) {
                window.location.href = 'index.html';
                return;
            }

            const user = session.user;
            document.getElementById('displayEmail').innerText = user.email;

            document.getElementById('cargandoMuro').style.display = 'none';
            const adgemAppId = "32676";
            
            // INYECCIÓN CORREGIDA CON LA URL OFICIAL DE ADUNITS Y VARIABLES EXACTAS
            const iframeWrapper = document.getElementById('iframe-wrapper');
            iframeWrapper.innerHTML = `
                <iframe 
                    src="https://adunits.adgem.com/v1/wall?appid=${adgemAppId}&playerid=${user.id}" 
                    frameborder="0">
                </iframe>
            `;
        }

        async function cerrarSesion() {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        }

        window.onload = initPage;
    </script>
</body>
</html>
