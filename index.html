<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetGamer MX | Portal de Acceso</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
        }
        .login-container h1 { font-size: 28px; font-weight: 800; margin-bottom: 5px; color: #00ffcc; text-transform: uppercase; letter-spacing: 2px;}
        .login-container p { color: #aaa; margin-bottom: 30px; font-size: 14px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 12px; color: #ccc; text-transform: uppercase; letter-spacing: 1px;}
        .input-group input { 
            width: 100%; padding: 15px; border-radius: 10px; border: none; 
            background: rgba(0, 0, 0, 0.5); color: #fff; font-size: 14px; outline: none;
            transition: 0.3s border; border: 1px solid transparent;
        }
        .input-group input:focus { border: 1px solid #00ffcc; }
        .btn {
            width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: 600; font-size: 16px;
            cursor: pointer; transition: 0.3s; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-primary { background: #00ffcc; color: #000; }
        .btn-primary:hover { background: #00cca3; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4); }
        .btn-secondary { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }
        .loader { display: none; margin-top: 10px; color: #00ffcc; font-size: 12px; }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>NetGamer MX</h1>
        <p>Tu portal de recompensas</p>

        <div class="input-group">
            <label>Correo Electrónico</label>
            <input type="email" id="email" placeholder="jugador@email.com" required>
        </div>
        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button class="btn btn-primary" onclick="handleAuth('login')">Entrar a ganar</button>
        <button class="btn btn-secondary" onclick="handleAuth('signup')">Crear cuenta nueva</button>
        <div id="loading" class="loader">Procesando...</div>
    </div>

    <script>
        const supabaseClient = supabase.createClient(
            'https://meiwuluwrdjszxeyoqtt.supabase.co', 
            'sb_publishable_gZgGIamNJqf8ir8vvt1OTw_bJ-rosi4'
        );

        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loader = document.getElementById('loading');

            if(!email || !password) {
                alert("Por favor, llena ambos campos.");
                return;
            }

            loader.style.display = 'block';

            try {
                let result;
                if (type === 'signup') {
                    result = await supabaseClient.auth.signUp({ email, password });
                } else {
                    result = await supabaseClient.auth.signInWithPassword({ email, password });
                }

                if (result.error) throw result.error;
                
                // Redirección exitosa
                window.location.href = 'ofertas.html';

            } catch (err) {
                alert("Error: " + err.message);
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
